<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NavcorX</title>
<meta name="description" content="NavcorX builds AI systems for market navigation, trading intelligence, and decision support.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#0d0d1a;
  color:#e0e0e0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px;
}
.wrap{
  text-align:center;
  max-width:480px;
  width:100%;
}
.logo{
  font-size:48px;
  font-weight:700;
  color:#7ec8e3;
  letter-spacing:2px;
  margin-bottom:10px;
}
.sub{
  font-size:14px;
  color:#4a7a99;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:32px;
}
.desc{
  font-size:15px;
  color:#888;
  line-height:1.7;
  margin-bottom:40px;
}
.btn{
  display:inline-block;
  padding:14px 32px;
  background:#0d2035;
  border:2px solid #7ec8e3;
  color:#7ec8e3;
  font-size:15px;
  font-weight:600;
  border-radius:6px;
  text-decoration:none;
  letter-spacing:1px;
  transition:background 0.15s;
}
.btn:hover{background:#1a3a55}
.btn-disabled{opacity:0.35;cursor:not-allowed;pointer-events:none;border-color:#444;color:#666;background:#111}
.status{
  margin-top:32px;
  font-size:11px;
  color:#333;
  letter-spacing:1px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">NavcorX</div>
  <div class="sub">AI market navigation core</div>
  <p class="desc">NavcorX builds AI systems for market navigation, trading intelligence, and decision support.</p>
  <span class="btn btn-disabled" id="live-btn">NavcorX Live (Private)</span>
  <div class="status" style="margin-top:10px;color:#444">Live endpoint is currently private.</div>
  <div class="status">Status: Early build in progress</div>
</div>
</body>
</html>
